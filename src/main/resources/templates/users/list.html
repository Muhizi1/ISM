<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>User Management</title>
</head>
<body>
<div th:replace="~{layout :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar}"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">User Management</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <div class="btn-group me-2">
                        <a th:href="@{/users/add}" class="btn btn-sm btn-primary" sec:authorize="hasRole('SYSADMIN')">
                            <i class="fas fa-plus"></i> Add New User
                        </a>
                    </div>
                </div>
            </div>

            <!-- Search and Filter -->
            <div class="card mb-4">
                <div class="card-body">
                    <form th:action="@{/users/filter}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <select class="form-select" name="role">
                                <option value="">All Roles</option>
                                <option th:each="role : ${roles}" 
                                        th:value="${role}" th:text="${role}" th:selected="${role.toString() == selectedRole}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <input type="text" class="form-control" name="department" placeholder="Department..." th:value="${selectedDepartment}">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-filter"></i> Filter
                            </button>
                            <a th:href="@{/users}" class="btn btn-outline-secondary">
                                <i class="fas fa-redo"></i> Reset
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Username</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Department</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th class="table-actions">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.username}">Username</td>
                                    <td th:text="${user.fullName}">Full Name</td>
                                    <td th:text="${user.email}">Email</td>
                                    <td th:text="${user.department}">Department</td>
                                    <td>
                                        <span class="badge bg-primary" th:text="${user.role}">Role</span>
                                    </td>
                                    <td>
                                        <span class="badge bg-success">Active</span>
                                    </td>
                                    <td class="table-actions">
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/users/view/{id}(id=${user.id})}" class="btn btn-outline-primary" title="View Details">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                            <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-outline-warning" 
                                               sec:authorize="hasRole('SYSADMIN')" title="Edit">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn btn-outline-danger" 
                                               sec:authorize="hasRole('SYSADMIN')" title="Delete"
                                               th:if="${#request.userPrincipal != null and #request.userPrincipal.name != user.username}"
                                               onclick="return confirm('Are you sure you want to delete this user?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(users)}" class="text-center py-5">
                        <i class="fas fa-users fa-3x text-muted mb-3"></i>
                        <h5 class="text-muted">No users found</h5>
                        <p class="text-muted">Try adjusting your filters or add a new user.</p>
                        <a th:href="@{/users/add}" class="btn btn-primary" sec:authorize="hasRole('SYSADMIN')">
                            <i class="fas fa-plus"></i> Add First User
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
