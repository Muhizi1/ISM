<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>User Profile</title>
</head>
<body>
<div th:replace="~{layout :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar}"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">User Profile</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a th:href="@{/users}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left"></i> Back to List
                    </a>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow mb-4">
                        <div class="card-body text-center py-5">
                            <i class="fas fa-user-circle fa-6x text-primary mb-3"></i>
                            <h4 th:text="${user.fullName}">Full Name</h4>
                            <p class="text-muted" th:text="${user.role}">Role</p>
                            <div class="badge bg-success mb-3">Active Account</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Account Details</h6>
                        </div>
                        <div class="card-body">
                            <div class="row mb-3">
                                <div class="col-sm-3 font-weight-bold">Username:</div>
                                <div class="col-sm-9" th:text="${user.username}">Username</div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-sm-3 font-weight-bold">Email:</div>
                                <div class="col-sm-9" th:text="${user.email}">Email</div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-sm-3 font-weight-bold">Department:</div>
                                <div class="col-sm-9" th:text="${user.department ?: 'N/A'}">Department</div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-sm-3 font-weight-bold">Role:</div>
                                <div class="col-sm-9" th:text="${user.role}">Role</div>
                            </div>
                            
                            <hr>
                            
                            <div class="d-flex justify-content-end">
                                <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-warning" sec:authorize="hasRole('SYSADMIN')">
                                    <i class="fas fa-edit"></i> Edit User
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
