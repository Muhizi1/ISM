<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>Edit Maintenance Record</title>
</head>
<body>
<div th:replace="~{layout :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar}"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Edit Maintenance Record</h1>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-body">
                            <form th:action="@{/maintenance/edit/{id}(id=${record.id})}" th:object="${record}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Equipment</label>
                                    <input type="text" class="form-control" th:value="${record.equipment.assetTag + ' - ' + record.equipment.model}" readonly>
                                    <input type="hidden" th:field="*{equipment}">
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="maintenanceType" class="form-label">Maintenance Type</label>
                                        <select class="form-select" id="maintenanceType" th:field="*{maintenanceType}" required>
                                            <option th:each="type : ${types}" th:value="${type}" th:text="${type}">Type</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="performedDate" class="form-label">Maintenance Date</label>
                                        <input type="date" class="form-control" id="performedDate" th:field="*{performedDate}" required>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="performedBy" class="form-label">Performed By</label>
                                        <input type="text" class="form-control" id="performedBy" th:field="*{performedBy}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="cost" class="form-label">Cost ($)</label>
                                        <input type="number" step="0.01" class="form-control" id="cost" th:field="*{cost}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" th:field="*{description}" rows="3" required></textarea>
                                </div>
                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <a th:href="@{/maintenance}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                                    <button type="submit" class="btn btn-warning">
                                        <i class="fas fa-save"></i> Update Record
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
