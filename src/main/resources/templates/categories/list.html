<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>Category Management</title>
</head>
<body>
<div th:replace="~{layout :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar}"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Category Management</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a th:href="@{/categories/add}" class="btn btn-sm btn-primary" sec:authorize="hasRole('SYSADMIN')">
                        <i class="fas fa-plus"></i> Add New Category
                    </a>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th class="table-actions">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cat : ${categories}">
                                    <td th:text="${cat.name}">Name</td>
                                    <td th:text="${cat.description}">Description</td>
                                    <td class="table-actions">
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/categories/view/{id}(id=${cat.id})}" class="btn btn-outline-primary" title="View Details">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                            <a th:href="@{/categories/edit/{id}(id=${cat.id})}" class="btn btn-outline-warning" 
                                               sec:authorize="hasRole('SYSADMIN')" title="Edit">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/categories/delete/{id}(id=${cat.id})}" class="btn btn-outline-danger" 
                                               sec:authorize="hasRole('SYSADMIN')" title="Delete"
                                               onclick="return confirm('Are you sure you want to delete this category?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
