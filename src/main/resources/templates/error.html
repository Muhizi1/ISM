<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Inventory Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 60px 50px;
            text-align: center;
            max-width: 540px;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .error-desc {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            padding: 13px 35px;
            font-weight: 600;
            border-radius: 30px;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin: 5px;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52,152,219,0.4);
            color: white;
        }
        .btn-back {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            border: none;
            padding: 13px 35px;
            font-weight: 600;
            border-radius: 30px;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin: 5px;
            cursor: pointer;
        }
        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(149,165,166,0.4);
            color: white;
        }
        .divider {
            border: none;
            border-top: 1px solid #ecf0f1;
            margin: 30px 0 20px;
        }
        .brand {
            color: #bdc3c7;
            font-size: 0.85rem;
        }
        .brand i { margin-right: 5px; }
    </style>
</head>
<body>
    <div class="error-card">

        <!-- Icon per status -->
        <div class="error-icon">
            <span th:if="${statusCode == 404}">🔍</span>
            <span th:if="${statusCode == 403}">🔒</span>
            <span th:if="${statusCode == 500}">⚠️</span>
            <span th:if="${statusCode != 404 and statusCode != 403 and statusCode != 500}">❗</span>
        </div>

        <!-- Status code -->
        <div class="error-code" th:text="${statusCode}">500</div>

        <!-- Title -->
        <div class="error-title" th:text="${errorTitle}">Internal Server Error</div>

        <!-- Description -->
        <p class="error-desc" th:text="${errorDescription}">
            Something went wrong on our end. Please try again.
        </p>

        <!-- Action buttons -->
        <div>
            <a href="/dashboard" class="btn-home">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <button onclick="history.back()" class="btn-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>
        </div>

        <hr class="divider">
        <p class="brand">
            <i class="fas fa-boxes"></i>
            Inventory Management System &mdash; Airtel Rwanda
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
