<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>My Profile</title>
</head>
<body>
<div th:replace="~{layout :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar}"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">My Profile</h1>
            </div>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card shadow">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-user-circle fa-6x text-primary mb-3"></i>
                            <h4 th:text="${user.fullName}">Full Name</h4>
                            <p class="text-muted" th:text="${user.role}">Role</p>
                            <span class="badge bg-success">Active Account</span>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-8">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Account Information</h6>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <tr>
                                    <th width="30%">Username</th>
                                    <td th:text="${user.username}">Username</td>
                                </tr>
                                <tr>
                                    <th>Email</th>
                                    <td th:text="${user.email}">Email</td>
                                </tr>
                                <tr>
                                    <th>Department</th>
                                    <td th:text="${user.department ?: 'N/A'}">Department</td>
                                </tr>
                                <tr>
                                    <th>Account Created</th>
                                    <td th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy HH:mm')}">Date</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                    
                    <div class="card shadow mb-4" th:if="${not #lists.isEmpty(user.assignments)}">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-info">My Current Assignments</h6>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Equipment</th>
                                            <th>Assigned Date</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="asgn : ${user.assignments}" th:if="${asgn.status.name() == 'ACTIVE'}">
                                            <td th:text="${asgn.equipment.assetTag + ' (' + asgn.equipment.model + ')'}">Equipment</td>
                                            <td th:text="${#temporals.format(asgn.assignedDate, 'MMM dd, yyyy')}">Date</td>
                                            <td><span class="badge bg-success" th:text="${asgn.status}">Status</span></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
