spring.application.name=ims

# Server
# Render.com sets the PORT environment variable automatically (usually 10000)
# Falls back to 8080 for local development
server.port=${PORT:8080}
server.servlet.context-path=/
server.servlet.session.timeout=30m

# Database
# On Render, set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD as environment variables
# For local development, the defaults below are used
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ims_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings (important for Render free tier)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Allow circular references
spring.main.allow-circular-references=true