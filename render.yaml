services:
  # ─── Web Service (Spring Boot) ───────────────────────────
  - type: web
    name: ims-inventory
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    # Render automatically injects PORT — Spring Boot reads it via ${PORT:8080}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ims-db
          property: connectionString

      - key: DATABASE_USERNAME
        fromDatabase:
          name: ims-db
          property: user

      - key: DATABASE_PASSWORD
        fromDatabase:
          name: ims-db
          property: password

      # Optional: set a secret key for session signing
      - key: SPRING_PROFILES_ACTIVE
        value: prod

    healthCheckPath: /login

# ─── MySQL Database ───────────────────────────────────────
databases:
  - name: ims-db
    plan: free
    databaseName: ims_db
    user: ims_user
